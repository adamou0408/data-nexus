[databases]
; All connections go to the same PG database but as different roles
; The connecting user determines the PG role (and thus the access level)
nexus_authz = host=postgres port=5432 dbname=nexus_authz

[pgbouncer]
listen_addr = 0.0.0.0
listen_port = 6432
auth_type = md5
auth_file = /etc/pgbouncer/userlist.txt

; Pool settings
pool_mode = transaction
default_pool_size = 20
max_client_conn = 200
min_pool_size = 2

; Logging
log_connections = 1
log_disconnections = 1
log_pooler_errors = 1

; Admin
admin_users = nexus_admin
stats_users = nexus_admin

; Timeouts
server_idle_timeout = 600
client_idle_timeout = 0
