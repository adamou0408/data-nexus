# Custom pg_hba.conf for Phison Data Nexus
# TYPE  DATABASE        USER                    ADDRESS         METHOD

# Superuser (owner) — trust from local
local   all             nexus_admin                             trust
host    all             nexus_admin             0.0.0.0/0       md5

# Path C pool roles — password auth on nexus_data (business data)
host    nexus_data      nexus_pe_ro             0.0.0.0/0       md5
host    nexus_data      nexus_sales_ro          0.0.0.0/0       md5
host    nexus_data      nexus_bi_ro             0.0.0.0/0       md5
host    nexus_data      nexus_etl_rw            0.0.0.0/0       md5
host    nexus_data      nexus_admin_full        0.0.0.0/0       md5

# Default: allow all (dev only)
host    all             all                     0.0.0.0/0       md5
local   all             all                                     trust
