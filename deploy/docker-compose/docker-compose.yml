services:
  postgres:
    image: timescale/timescaledb-ha:pg16
    environment:
      POSTGRES_DB: nexus_authz
      POSTGRES_USER: nexus_admin
      POSTGRES_PASSWORD: nexus_dev_password
    ports:
      - "15432:5432"
    volumes:
      # timescaledb-ha image uses PGDATA=/home/postgres/pgdata/data — mount
      # the volume one level up so the image's init creates `data/` inside.
      - pgdata:/home/postgres/pgdata
      - pglog:/home/postgres/pg_log
      - ../../database/migrations:/docker-entrypoint-initdb.d/migrations:ro
      - ../../database/seed:/docker-entrypoint-initdb.d/seed:ro
      - ./init-db.sh:/docker-entrypoint-initdb.d/00-init-db.sh:ro
      - ./pg_hba_custom.conf:/var/lib/postgresql/pg_hba.conf:ro
    # Note: init-db.sh creates nexus_data as second DB in the same instance.
    # Authz migrations run on nexus_authz, data migrations (migrations/data/) run on nexus_data.
    command:
      - "postgres"
      - "-c"
      - "hba_file=/var/lib/postgresql/pg_hba.conf"
      - "-c"
      - "shared_preload_libraries=timescaledb,pgaudit,pg_cron"
      - "-c"
      - "cron.database_name=nexus_authz"
      - "-c"
      - "cron.use_background_workers=on"
      - "-c"
      - "pgaudit.log=read"
      - "-c"
      - "pgaudit.log_catalog=off"
      - "-c"
      - "pgaudit.log_relation=on"
      - "-c"
      - "pgaudit.log_parameter=off"
      - "-c"
      - "log_destination=csvlog"
      - "-c"
      - "logging_collector=on"
      - "-c"
      - "log_directory=/home/postgres/pg_log"
      - "-c"
      - "log_filename=postgresql-%Y-%m-%d_%H%M%S.log"
      - "-c"
      - "log_rotation_age=1h"
      - "-c"
      - "log_rotation_size=0"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U nexus_admin -d nexus_authz"]
      interval: 5s
      timeout: 3s
      retries: 10

  pgbouncer:
    image: edoburu/pgbouncer:latest
    environment:
      DATABASE_URL: postgres://nexus_admin:nexus_dev_password@postgres:5432/nexus_authz
    ports:
      - "16432:6432"
    volumes:
      - ./pgbouncer/pgbouncer.ini:/etc/pgbouncer/pgbouncer.ini
      - ./pgbouncer/userlist.txt:/etc/pgbouncer/userlist.txt
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -h 127.0.0.1 -p 6432 -U nexus_admin || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "16379:6379"
    command:
      - "redis-server"
      - "--appendonly"
      - "yes"
      - "--appendfsync"
      - "everysec"
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s

volumes:
  pgdata:
  pglog:
  redisdata:
